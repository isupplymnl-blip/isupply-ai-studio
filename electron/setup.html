<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>iSupply AI Studio — Setup</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: #0A0A0B;
    color: #F1F0F5;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  .card {
    width: 420px;
    background: #111113;
    border: 1px solid #2A2A35;
    border-radius: 18px;
    padding: 36px 32px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
  }

  .logo {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, #7C3AED, #0D9488);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 17px; color: #fff;
    margin-bottom: 20px;
  }

  h1 { font-size: 20px; font-weight: 700; color: #F1F0F5; margin-bottom: 4px; }
  .sub { font-size: 12px; color: #55556A; margin-bottom: 24px; line-height: 1.6; }

  label { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase;
          letter-spacing: .08em; color: #55556A; margin-bottom: 6px; }

  .provider-row {
    display: flex; gap: 6px; margin-bottom: 20px;
  }
  .provider-btn {
    flex: 1; padding: 9px; border-radius: 8px;
    border: 1px solid #2A2A35; background: #1A1A1F;
    color: #55556A; font-size: 11px; font-weight: 600;
    cursor: pointer; transition: all .15s;
  }
  .provider-btn.active {
    background: #7C3AED22; border-color: #7C3AED; color: #F1F0F5;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 10px;
  }
  .input-wrap input {
    width: 100%; padding: 10px 40px 10px 12px;
    background: #1A1A1F; border: 1px solid #2A2A35; border-radius: 8px;
    color: #F1F0F5; font-size: 13px; outline: none;
    font-family: 'Courier New', monospace;
    transition: border-color .15s;
  }
  .input-wrap input:focus { border-color: #7C3AED; }
  .input-wrap input.error { border-color: #F43F5E; }
  .toggle-vis {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: #55556A; cursor: pointer;
    font-size: 15px; line-height: 1; padding: 2px;
  }
  .toggle-vis:hover { color: #9090A8; }

  .hint {
    font-size: 10px; color: #55556A; margin-bottom: 20px; line-height: 1.6;
  }
  .hint a { color: #7C3AED; text-decoration: none; }
  .hint a:hover { text-decoration: underline; }

  .error-msg {
    font-size: 11px; color: #F43F5E;
    background: #F43F5E11; border: 1px solid #F43F5E33;
    border-radius: 7px; padding: 8px 12px; margin-bottom: 14px;
    display: none;
  }
  .error-msg.visible { display: block; }

  button.primary {
    width: 100%; padding: 12px;
    background: linear-gradient(135deg, #7C3AED, #0D9488);
    border: none; border-radius: 9px;
    color: #fff; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: opacity .15s;
    letter-spacing: .02em;
  }
  button.primary:hover { opacity: .88; }
  button.primary:disabled { opacity: .4; cursor: not-allowed; }

  .loading {
    display: none; text-align: center; padding: 20px 0 4px;
  }
  .loading.visible { display: block; }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid #2A2A35; border-top-color: #7C3AED;
    border-radius: 50%; margin: 0 auto 10px;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 12px; color: #55556A; }

  .divider {
    border: none; border-top: 1px solid #2A2A35;
    margin: 22px 0;
  }
  .footer { font-size: 10px; color: #55556A; text-align: center; line-height: 1.6; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">iS</div>
  <h1>iSupply AI Studio</h1>
  <p class="sub">Choose your AI provider and enter your API key. Stored locally, never uploaded.</p>

  <label>AI Provider</label>
  <div class="provider-row">
    <button id="btnGemini" class="provider-btn active" onclick="selectProvider('gemini')">Google Gemini</button>
    <button id="btnEcco"   class="provider-btn"        onclick="selectProvider('ecco')">EccoAPI (Nano Banana)</button>
  </div>

  <label id="keyLabel">Gemini API Key</label>
  <div class="input-wrap">
    <input type="password" id="apiKey" placeholder="AIza…" autocomplete="off" spellcheck="false" />
    <button class="toggle-vis" id="toggleVis" title="Show / hide key">👁</button>
  </div>

  <div class="hint">
    Don't have a key?
    <a href="#" id="linkProvider">Get one free →</a>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <button class="primary" id="saveBtn">Save &amp; Launch</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Starting iSupply AI Studio…</p>
  </div>

  <hr class="divider" />
  <p class="footer">Your key is stored in your system's user-data folder and is never shared.</p>
</div>

<script>
  const input     = document.getElementById('apiKey');
  const saveBtn   = document.getElementById('saveBtn');
  const errorMsg  = document.getElementById('errorMsg');
  const loading   = document.getElementById('loading');
  const toggleBtn = document.getElementById('toggleVis');
  const keyLabel  = document.getElementById('keyLabel');
  const linkProv  = document.getElementById('linkProvider');
  let visible     = false;
  let provider    = 'gemini';

  const PROVIDERS = {
    gemini: {
      label:       'Gemini API Key',
      placeholder: 'AIza…',
      hint:        'Get one free at Google AI Studio →',
      url:         'https://aistudio.google.com/app/apikey',
      validate:    k => k.startsWith('AIza') && k.length >= 20,
      errMsg:      'Should start with "AIza" and be at least 20 characters.',
    },
    ecco: {
      label:       'EccoAPI Key',
      placeholder: 'nk_live_…',
      hint:        'Get one free at EccoAPI Dashboard →',
      url:         'https://eccoapi.com/dashboard',
      validate:    k => k.startsWith('nk_live_') && k.length >= 20,
      errMsg:      'Should start with "nk_live_" and be at least 20 characters.',
    },
  };

  function selectProvider(p) {
    provider = p;
    document.getElementById('btnGemini').classList.toggle('active', p === 'gemini');
    document.getElementById('btnEcco').classList.toggle('active',   p === 'ecco');
    const cfg = PROVIDERS[p];
    keyLabel.textContent  = cfg.label;
    input.placeholder     = cfg.placeholder;
    linkProv.textContent  = cfg.hint;
    input.value           = '';
    clearError();
  }

  if (window.studio?.onPrefillConfig) {
    window.studio.onPrefillConfig(cfg => {
      selectProvider(cfg.provider ?? 'gemini');
      input.value = cfg.provider === 'ecco' ? (cfg.eccoApiKey ?? '') : (cfg.geminiApiKey ?? '');
    });
  }

  linkProv.addEventListener('click', e => {
    e.preventDefault();
    window.open(PROVIDERS[provider].url, '_blank');
  });

  toggleBtn.addEventListener('click', () => {
    visible = !visible;
    input.type = visible ? 'text' : 'password';
    toggleBtn.textContent = visible ? '🙈' : '👁';
  });

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('visible');
    input.classList.add('error');
  }
  function clearError() {
    errorMsg.classList.remove('visible');
    input.classList.remove('error');
  }

  saveBtn.addEventListener('click', async () => {
    clearError();
    const key = input.value.trim();
    if (!key) { showError('Please enter an API key.'); return; }
    if (!PROVIDERS[provider].validate(key)) {
      showError(PROVIDERS[provider].errMsg);
      return;
    }
    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving…';
    loading.classList.add('visible');

    const result = await window.studio.saveConfig({ provider, apiKey: key });

    if (result?.error) {
      showError(result.error);
      saveBtn.disabled = false;
      saveBtn.textContent = 'Save & Launch';
      loading.classList.remove('visible');
    }
  });

  input.addEventListener('keydown', e => { if (e.key === 'Enter') saveBtn.click(); });
</script>
</body>
</html>
